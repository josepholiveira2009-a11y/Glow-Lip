<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Lip</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

.inicio{
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
  linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url("fundo.jpg");

  background-size:cover;
  background-position:center;
}

.mensagem{

  background:rgba(0,0,0,0.6);

  padding:50px;

  border-radius:20px;

  width:70%;

  text-align:center;

}

.produtos{

  min-height:100vh;

  display:flex;

  justify-content:center;

  gap:150px;

  padding:100px;

  background:#1b1b1b;

}

.card{

  width:350px;
  height:500px;

  background:rgba(40,40,40,0.6);

  border-radius:25px;

  padding:40px;

}

</style>
</head>

<body>

<section class="inicio">

<div class="mensagem">

<h1>Glow Lip</h1>

<p>
Hidratação natural para seus lábios.
</p>

</div>

</section>

<section class="produtos">

<div class="card">

<h2>Glow Lip de Menta 🍃</h2>

<p>
Cera de abelha,
manteiga de cacau,
óleo de coco
e aromatizante de menta.
</p>

</div>

<div class="card">

<h2>Glow Lip de Laranja 🍊</h2>

<p>
Cera de abelha,
manteiga de cacau,
óleo de coco
e aromatizante de laranja.
</p>

</div>

</section>

</body>
</html>
